# Taiyi / The One — example configuration.
# Copy to taiyi.yaml and edit. Every value can also be set via TAIYI_* env vars
# (env overrides the file). Run with:  taiyi serve --config taiyi.yaml

base_dir: ./state          # persistence root: audit log, SQLite memory, markdown
host: 127.0.0.1            # use 0.0.0.0 in a container
port: 8080

# Bearer auth. Empty list = open (local use). Add tokens to require auth.
auth_tokens: []

# Execution backend:
#   mock    — side-effect-free (safe default for trials/demos)
#   sandbox — real shell/file execution inside sandbox_dir (governed + credential-isolated)
executor: mock
sandbox_dir: ./state/sandbox

max_rounds: 1              # PDCA correction rounds before a validation failure is terminal

# Runtime shape:
#   agent     — ReAct loop: the model proposes one tool call at a time, governance
#               gates it, the result is fed back, and it decides the next step.
#               This is the default and the "highest decision-maker" path.
#   workflow  — plan-once: a planner emits a fixed plan that is then cleared and
#               executed step by step. Use when a task has a known fixed procedure.
mode: agent

# LLM provider. The system is offline-first: provider=offline runs the whole loop
# on deterministic offline providers (zero tokens, zero network). To use a real
# model, pick a protocol and fill base_url/model/api_key. Any OpenAI-compatible
# endpoint works through the same adapter.
#
#   provider: ollama        # local Ollama — no key needed, runs on your machine
#   base_url: http://localhost:11434/v1
#   model: qwen2.5:7b        # whatever you `ollama pull`ed
#   api_key: null            # Ollama ignores this; leave empty
#
#   provider: openai_compat  # DeepSeek / 智谱 / Moonshot / OpenAI / SiliconFlow / …
#   base_url: https://api.deepseek.com/v1
#   model: deepseek-chat
#   api_key: sk-...          # your key; stored here (gitignored), restart to apply
#
# Requires the [live] extra:  pip install -e ".[live]"   (adds httpx)
provider: offline
base_url: null
model: null
api_key: null
# api_key_env is an alternative: name an env var that holds the key value
# (useful for secrets managers). Overrides api_key if set.
api_key_env: null

# Custom rules / scenarios / skills are MERGED with the built-ins (yours can
# override a built-in by reusing its id/name). Drop YAML/Markdown into these dirs.
rules_dirs: []
scenarios_dirs: []
skills_dirs: []

log_level: info
