id: security.credential_env.no_print
domain: security
severity: red_line
applies_to:
  - "shell:*env*"
  - "shell:echo*"
trigger: pre_execution
check:
  type: deterministic
  match: args_any
  patterns:
    - "*API_KEY*"
    - "*_TOKEN*"
    - "*_SECRET*"
on_fail:
  action: block
  message: "Printing API keys, tokens, or secrets to the shell is forbidden."
precedence: 100
owner: platform-security
audit: true
